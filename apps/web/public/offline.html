<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>You're offline · Crestly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#100D0A" />
  <style>
    :root {
      --ink:#100D0A; --ink-40:#7A7066; --cream:#F5EFE3; --cream-soft:#FAF6EC;
      --orange:#F25C19; --rule:rgba(16,13,10,0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--cream-soft);
      font-family: "Geist", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
    }
    .card {
      background: #fff; border: 1px solid var(--rule); border-radius: 12px;
      padding: 32px; max-width: 420px; text-align: center; margin: 16px;
    }
    .logo {
      width: 56px; height: 56px; border-radius: 12px;
      background: var(--ink); margin: 0 auto 16px; display: grid; place-items: center;
    }
    h1 { font-size: 24px; letter-spacing: -0.02em; margin: 0 0 8px; }
    h1 .dot { color: var(--orange); }
    p { color: var(--ink-40); margin: 0 0 24px; line-height: 1.5; }
    button {
      background: var(--orange); color: var(--cream); border: 0;
      padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 100 100" width="32" height="32">
        <rect width="100" height="100" rx="22" fill="transparent" />
        <path d="M 80 36 A 34 34 0 1 0 80 68 L 58.25 68 A 18 18 0 1 1 58.25 36 Z" fill="#F5EFE3" fill-rule="evenodd"/>
        <circle cx="72" cy="78" r="6.5" fill="#F25C19"/>
      </svg>
    </div>
    <h1>No connection<span class="dot">.</span></h1>
    <p>You're offline. Cached pages still work; new data will sync once you're back online.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
